<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Práctica 05 — Registro con persistencia</title>
    <style>
        body {
            font-family: sans-serif;
            max-width: 440px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .campo {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 4px;
        }

        input {
            display: block;
            width: 100%;
            padding: 8px;
            font-size: 1rem;
            box-sizing: border-box;
        }

        .error {
            color: red;
            font-size: 0.9rem;
            min-height: 1.2em;
            display: block;
            margin-top: 4px;
        }

        button {
            padding: 10px 24px;
            font-size: 1rem;
            cursor: pointer;
        }

        #bienvenida {
            margin-top: 20px;
            font-size: 1.2rem;
            color: #1a7a1a;
        }
    </style>
</head>

<body>

    <h1>Registro</h1>

    <form id="form">

        <div class="campo">
            <label for="nombre">Nombre *</label>
            <input type="text" id="nombre" placeholder="Tu nombre completo">
            <span class="error" id="error-nombre"></span>
        </div>

        <div class="campo">
            <label for="equipo">Equipo favorito (opcional)</label>
            <input type="text" id="equipo" placeholder="Ej: Argentina">
        </div>

        <button type="submit">Guardar</button>

    </form>

    <div id="bienvenida" style="display:none"></div>
    <button id="btn-salir" style="display:none">Salir</button>

    <script>
        const form = document.querySelector('#form');
        const inputNombre = document.querySelector('#nombre');
        const inputEquipo = document.querySelector('#equipo');
        const errorNombre = document.querySelector('#error-nombre');
        const bienvenida = document.querySelector('#bienvenida');
        const btnSalir = document.querySelector('#btn-salir');

        function mostrarBienvenida(usuario) {
            bienvenida.textContent = `¡Bienvenido, ${usuario.nombre}! Tu equipo: ${usuario.equipo || 'sin equipo'}`;
            bienvenida.style.display = 'block';
            btnSalir.style.display = 'inline-block';
            form.style.display = 'none';
        }

        function mostrarFormulario() {
            form.style.display = 'block';
            bienvenida.style.display = 'none';
            btnSalir.style.display = 'none';
        }

        document.addEventListener('DOMContentLoaded', () => {
            const guardado = localStorage.getItem('usuario');

            if (guardado) {
                const usuario = JSON.parse(guardado);
                mostrarBienvenida(usuario);
            } else {
                mostrarFormulario();
            }
        });

        form.addEventListener('submit', (e) => {
            e.preventDefault();

            const nombre = inputNombre.value;

            if (nombre.trim() === '') {
                errorNombre.textContent = 'El nombre no puede estar vacío.';
                return;
            }

            errorNombre.textContent = '';

            const equipo = inputEquipo.value;
            const usuario = { nombre: nombre.trim(), equipo: equipo.trim() };
            localStorage.setItem('usuario', JSON.stringify(usuario));
            mostrarBienvenida(usuario);
        });

        btnSalir.addEventListener('click', () => {
            localStorage.removeItem('usuario');
            mostrarFormulario();
        });
    </script>

</body>

</html>
