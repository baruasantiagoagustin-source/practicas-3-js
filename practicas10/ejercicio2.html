<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Práctica 02 — Validar un nombre</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 420px;
      margin: 40px auto;
      padding: 0 20px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: bold;
    }

    input {
      padding: 8px;
      font-size: 1rem;
      width: 100%;
      box-sizing: border-box;
    }

    button {
      margin-top: 12px;
      padding: 8px 20px;
      font-size: 1rem;
      cursor: pointer;
    }

    #error {
      color: red;
      margin-top: 8px;
      min-height: 1.2em;
    }

    #resultado {
      margin-top: 16px;
      font-size: 1.1rem;
      color: #1a7a1a;
    }
  </style>
</head>

<body>

  <h1>Práctica 02</h1>
  <p>Ingresá tu nombre. Se validará antes de aceptarlo.</p>

  <form id="miForm">
    <label for="nombre">Nombre</label>
    <input type="text" id="nombre" placeholder="Ej: María">
    <p id="error"></p>
    <button type="submit">Enviar</button>
  </form>

  <p id="resultado"></p>

  <script>
    const inputNombre = document.getElementById('nombre');
    const form = document.getElementById('miForm');
    const error = document.getElementById('error');
    const resultado = document.getElementById('resultado');

    function tieneNumero(texto) {
      return /\d/.test(texto);
    }

    function validarNombre(nombre) {
      const nombreTrim = nombre.trim();

      if (nombreTrim.length === 0) {
        return 'El nombre no puede estar vacío.';
      }

      if (nombreTrim.length < 3) {
        return 'El nombre debe tener al menos 3 caracteres.';
      }

      if (tieneNumero(nombreTrim)) {
        return 'El nombre no puede contener números.';
      }

      return '';
    }

    form.addEventListener('submit', (event) => {
      event.preventDefault();

      const mensajeError = validarNombre(inputNombre.value);

      if (mensajeError) {
        error.textContent = mensajeError;
        resultado.textContent = '';
        return;
      }

      error.textContent = '';
      resultado.textContent = `Bienvenido/a, ${inputNombre.value.trim()}!`;
    });
  </script>

</body>

</html>
