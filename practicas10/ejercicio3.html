<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Práctica 03 — Formulario de registro</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 440px;
      margin: 40px auto;
      padding: 0 20px;
    }
    .campo {
      margin-bottom: 20px;
    }
    label {
      display: block;
      font-weight: bold;
      margin-bottom: 4px;
    }
    input {
      display: block;
      width: 100%;
      padding: 8px;
      font-size: 1rem;
      box-sizing: border-box;
    }
    .error {
      color: red;
      font-size: 0.9rem;
      min-height: 1.2em;
      display: block;
      margin-top: 4px;
    }
    button {
      padding: 10px 24px;
      font-size: 1rem;
      cursor: pointer;
    }
    #exito {
      margin-top: 20px;
      color: #1a7a1a;
      font-size: 1.1rem;
    }
  </style>
</head>
<body>

  <h1>Registro</h1>

  <form id="formRegistro">

    <div class="campo">
      <label for="nombre">Nombre</label>
      <input type="text" id="nombre" placeholder="Tu nombre completo">
      <span class="error" id="error-nombre"></span>
    </div>

    <div class="campo">
      <label for="email">Email</label>
      <input type="text" id="email" placeholder="tu@email.com">
      <span class="error" id="error-email"></span>
    </div>

    <div class="campo">
      <label for="password">Contraseña</label>
      <input type="password" id="password" placeholder="Mínimo 6 caracteres">
      <span class="error" id="error-password"></span>
    </div>

    <button type="submit">Registrarse</button>

  </form>

  <p id="exito"></p>

  <script>
    const form = document.querySelector("#formRegistro");
    const errorNombre = document.querySelector("#error-nombre");
    const errorEmail = document.querySelector("#error-email");
    const errorPassword = document.querySelector("#error-password");
    const exito = document.querySelector("#exito");

    function validarNombre(valor) {
      const nombre = valor.trim();

      if (nombre.length === 0) {
        return "El nombre es obligatorio.";
      }

      if (nombre.length < 3) {
        return "El nombre debe tener al menos 3 caracteres.";
      }

      return null;
    }

    function validarEmail(valor) {
      const email = valor.trim();

      if (email.length === 0) {
        return "El email es obligatorio.";
      }

      const regexEmail = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!regexEmail.test(email)) {
        return "Ingresá un email válido.";
      }

      return null;
    }

    function validarPassword(valor) {
      const password = valor.trim();

      if (password.length === 0) {
        return "La contraseña es obligatoria.";
      }

      if (password.length < 6) {
        return "La contraseña debe tener al menos 6 caracteres.";
      }

      return null;
    }

    form.addEventListener("submit", (e) => {
      e.preventDefault();

      const nombre = document.querySelector("#nombre").value;
      const email = document.querySelector("#email").value;
      const password = document.querySelector("#password").value;

      const errorNombreTexto = validarNombre(nombre);
      const errorEmailTexto = validarEmail(email);
      const errorPasswordTexto = validarPassword(password);

      errorNombre.textContent = errorNombreTexto || "";
      errorEmail.textContent = errorEmailTexto || "";
      errorPassword.textContent = errorPasswordTexto || "";

      if (errorNombreTexto || errorEmailTexto || errorPasswordTexto) {
        exito.textContent = "";
        return;
      }

      exito.textContent = `Registro completado con éxito para ${nombre.trim()}.`;
    });
  </script>

</body>
</html>
