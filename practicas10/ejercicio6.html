<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Práctica 06 — Validación nativa HTML5</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 440px;
      margin: 40px auto;
      padding: 0 20px;
    }
    .campo {
      margin-bottom: 20px;
    }
    label {
      display: block;
      font-weight: bold;
      margin-bottom: 4px;
    }
    input {
      display: block;
      width: 100%;
      padding: 8px;
      font-size: 1rem;
      box-sizing: border-box;
    }
    .error {
      color: red;
      font-size: 0.85em;
      min-height: 1.2em;
      display: block;
      margin-top: 4px;
    }
    button {
      padding: 10px 24px;
      font-size: 1rem;
      cursor: pointer;
    }
    #exito {
      margin-top: 20px;
      color: #1a7a1a;
      font-size: 1.1rem;
    }
  </style>
</head>
<body>

  <h1>Registro</h1>

  <!-- Parte A: probá enviar el formulario vacío tal como está.
       Parte B: cuando estés listo, agregá el atributo novalidate acá abajo. -->
  <form id="form" novalidate>

    <div class="campo">
      <label for="nombre">Nombre</label>
      <input id="nombre" type="text" required minlength="2" placeholder="Tu nombre completo">
      <span class="error" id="err-nombre"></span>
    </div>

    <div class="campo">
      <label for="email">Email</label>
      <input id="email" type="email" required placeholder="tu@email.com">
      <span class="error" id="err-email"></span>
    </div>

    <div class="campo">
      <label for="pass">Contraseña</label>
      <input id="pass" type="password" required minlength="6" placeholder="Mínimo 6 caracteres">
      <span class="error" id="err-pass"></span>
    </div>

    <button type="submit">Registrarse</button>

  </form>

  <p id="exito"></p>

  <script>
    // PARTE A: no escribas nada todavía. Abrí el browser y enviá el formulario vacío.
    // Observá qué muestra el browser.

    //1- Muestra "please fill out this field", aparece abajo del input de nombre, un poco mas adelante visualmente.
    //2- esta en ingles.
    //3- No, no se puede.

    // PARTE B

    const form = document.querySelector("#form");
    const errorNombre = document.querySelector("#err-nombre");
    const errorEmail = document.querySelector("#err-email");
    const errorPassword = document.querySelector("#err-pass");
    const exito = document.querySelector("#exito");

    const campos = [
      { input: document.querySelector("#nombre"), error: errorNombre },
      { input: document.querySelector("#email"), error: errorEmail },
      { input: document.querySelector("#pass"), error: errorPassword }
    ];

    form.addEventListener("submit", (e) => {
      e.preventDefault();

      let AllValid = true;

      for (const campo of campos) {
        const valido = campo.input.checkValidity();
        campo.error.textContent = valido ? "" : campo.input.validationMessage;

        if (!valido) {
          AllValid = false;
        }
      }

      if (AllValid) {
        exito.textContent = "¡Registro exitoso!";
      } else {
        exito.textContent = "";
      }
    });

    // PARTE C:
    // TODO: Escuchá el evento "input" en #nombre.
    //   Si value.trim() === "", llamá setCustomValidity("El nombre no puede estar vacío.").
    //   Si no, llamá setCustomValidity("") para limpiar.

    // PARTE D: Completá la tabla comparativa en el README o en un comentario acá.
  </script>

</body>
</html>
