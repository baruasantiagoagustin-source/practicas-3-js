<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Práctica 03 — Saludo en vivo</title>
    <style>
        body {
            font-family: sans-serif;
            max-width: 420px;
            margin: 3rem auto;
            padding: 0 1rem;
        }

        input {
            font-size: 1.1rem;
            padding: 0.5rem;
            width: 100%;
            box-sizing: border-box;
        }

        #saludo {
            font-size: 1.6rem;
            margin-top: 1.5rem;
        }
    </style>
</head>

<body>
    <h1>Saludo en vivo</h1>

    <input id="nombres" placeholder="Escribí tu nombre">

    <p id="saludo">Hola, <span id="span">...</span></p>

    <script>
       

        const nombre = document.getElementById('nombres');
        const span = document.getElementById('span');

        nombre.addEventListener('input',  function(event) {
            span.textContent = event.target.value;
        }) 
    </script>


</body>

</html>
