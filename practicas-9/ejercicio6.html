<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Práctica 06 — Lista de tareas</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 420px;
      margin: 3rem auto;
      padding: 0 1rem;
    }

    .controles {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    #nueva {
      flex: 1;
      font-size: 1rem;
      padding: 0.5rem;
    }

    button {
      font-size: 1rem;
      padding: 0.5rem 1rem;
      cursor: pointer;
    }

    ul {
      list-style: none;
      padding: 0;
    }

    li {
      padding: 0.5rem 1rem;
      margin-bottom: 0.4rem;
      background-color: #f0f0f0;
      border-radius: 4px;
      cursor: pointer;
    }

    /* Una tarea completada se tacha */
    li.hecha {
      text-decoration: line-through;
      opacity: 0.5;
    }
  </style>
</head>

<body>
  <h1>Lista de tareas</h1>

  <div class="controles">
    <input id="nueva" placeholder="Nueva tarea">
    <button id="agregar">Agregar</button>
  </div>

  <ul id="tareas"></ul>

  <script>
    const agregar = document.getElementById('agregar');
    const tareas = document.getElementById('tareas');
    const nueva = document.getElementById('nueva');

    function agregarTarea() {
      let texto = nueva.value.trim();

      if (texto !== "") {
        let li = document.createElement('li');
        li.textContent = texto;
        tareas.appendChild(li);
        nueva.value = '';
      }
    }

    agregar.addEventListener('click', agregarTarea);

    tareas.addEventListener("click", (event) => {
      if (event.target.tagName === "LI") {
        event.target.classList.toggle("hecha");
      }
    });
  </script>
</body>

</html>
