<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Práctica 05 — Filtro de jugadores</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 420px;
      margin: 3rem auto;
      padding: 0 1rem;
    }
    input {
      font-size: 1.1rem;
      padding: 0.5rem;
      width: 100%;
      box-sizing: border-box;
      margin-bottom: 1rem;
    }
    ul {
      list-style: none;
      padding: 0;
    }
    li {
      padding: 0.5rem 1rem;
      margin-bottom: 0.4rem;
      background-color: #f0f0f0;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <h1>Buscar jugador</h1>

  <input id="buscador" placeholder="Escribí para filtrar...">

  <ul id="lista"></ul>

  <script>
    const jugadores = [
      "Lionel Messi",
      "Emiliano Martínez",
      "Julián Álvarez",
      "Enzo Fernández",
      "Rodrigo De Paul",
      "Ángel Di María",
      "Cristiano Ronaldo",
      "Kylian Mbappé",
    ];

    const ul = document.getElementById('lista');
    const buscador = document.getElementById('buscador');

    jugadores.forEach((jugador) => {
      const li = document.createElement('li');
      li.textContent = jugador;
      ul.appendChild(li);
    });

    const items = Array.from(ul.querySelectorAll('li'));

    buscador.addEventListener('input', () => {
      const texto = buscador.value.toLowerCase();

      items.forEach((item) => {
        const nombre = item.textContent.toLowerCase();
        item.style.display = nombre.includes(texto) ? '' : 'none';
      });
    });
  </script>
</body>
</html>
