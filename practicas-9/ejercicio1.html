<html>

<head>
    <title>GOLAZO</title>
</head>

<body>

    <button id="gol">
        Goles!
    </button>

    <span id="show-number"></span>

    <script>
        const cajita = document.getElementById('show-number')
        const buttonInc = document.getElementById('gol');
        let numero = 0;

        function sumar() {
            numero++;
            cajita.textContent = numero;
        }

        buttonInc.addEventListener("click", sumar)
    </script>

</body>



</html>
